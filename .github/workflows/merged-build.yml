name: Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Read version
        if: github.event_name == 'push'
        id: version
        run: |
          source <(grep = version.properties | tr -d ' ')
          echo "major=$versionMajor" >> $GITHUB_OUTPUT
          echo "minor=$versionMinor" >> $GITHUB_OUTPUT
          echo "patch=$versionPatch" >> $GITHUB_OUTPUT
          echo "build=$versionBuild" >> $GITHUB_OUTPUT
          echo "full=$versionMajor.$versionMinor.$versionPatch.$versionBuild" >> $GITHUB_OUTPUT

      - name: Find APK
        if: github.event_name == 'push'
        id: apk
        run: |
          APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          APK_NAME="MadeMeDance-${{ steps.version.outputs.full }}-debug.apk"
          mv "$APK_PATH" "$APK_NAME"
          echo "path=$APK_NAME" >> $GITHUB_OUTPUT
          echo "name=$APK_NAME" >> $GITHUB_OUTPUT

      - name: Create/Update debug release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="latest-debug-v${{ steps.version.outputs.major }}.${{ steps.version.outputs.minor }}"
          # Delete existing release and tag if they exist
          gh release delete "$TAG" --yes 2>/dev/null || true
          git tag -f "$TAG"
          git push origin "$TAG" --force
          # Create new release with the APK
          gh release create "$TAG" \
            "${{ steps.apk.outputs.path }}" \
            --title "Debug Build v${{ steps.version.outputs.full }}" \
            --notes "Automated debug build from commit ${{ github.sha }}" \
            --prerelease
