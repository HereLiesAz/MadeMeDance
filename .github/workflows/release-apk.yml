name: Release APK

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Generate keystore
        env:
          KEYSTORE_PRIVATE: ${{ secrets.KEYSTORE_PRIVATE }}
          KEYSTORE_CHAIN: ${{ secrets.CHAIN }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_PRIVATE" ] && [ -n "$KEYSTORE_CHAIN" ]; then
            echo "$KEYSTORE_PRIVATE" > private_key.pem
            echo "$KEYSTORE_CHAIN" > cert_chain.pem
            openssl pkcs12 -export \
              -inkey private_key.pem \
              -in cert_chain.pem \
              -out keystore.p12 \
              -name "$KEY_ALIAS" \
              -passout pass:"$KEYSTORE_PASSWORD"
            keytool -importkeystore \
              -srckeystore keystore.p12 \
              -srcstoretype PKCS12 \
              -srcstorepass "$KEYSTORE_PASSWORD" \
              -destkeystore app/keystore.jks \
              -deststoretype JKS \
              -deststorepass "$KEYSTORE_PASSWORD"
            rm -f private_key.pem cert_chain.pem keystore.p12
            echo "SIGNING_READY=true" >> $GITHUB_ENV
          else
            echo "::warning::Keystore secrets not configured. Building unsigned release."
            echo "SIGNING_READY=false" >> $GITHUB_ENV
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Build release APK
        run: |
          if [ "$SIGNING_READY" = "true" ]; then
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file=$(pwd)/app/keystore.jks \
              -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
              -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
              -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}
          else
            ./gradlew assembleRelease
          fi

      - name: Read version
        id: version
        run: |
          source <(grep = version.properties | tr -d ' ')
          echo "major=$versionMajor" >> $GITHUB_OUTPUT
          echo "minor=$versionMinor" >> $GITHUB_OUTPUT
          echo "patch=$versionPatch" >> $GITHUB_OUTPUT
          echo "build=$versionBuild" >> $GITHUB_OUTPUT
          echo "full=$versionMajor.$versionMinor.$versionPatch.$versionBuild" >> $GITHUB_OUTPUT

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.properties
          git commit -m "chore: bump version to ${{ steps.version.outputs.full }}" || echo "No version change to commit"
          git push

      - name: Find APK
        id: apk
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          APK_NAME="MadeMeDance-${{ steps.version.outputs.full }}-release.apk"
          mv "$APK_PATH" "$APK_NAME"
          echo "path=$APK_NAME" >> $GITHUB_OUTPUT
          echo "name=$APK_NAME" >> $GITHUB_OUTPUT

      - name: Create/Update release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          TAG="latest-release-v${{ steps.version.outputs.major }}.${{ steps.version.outputs.minor }}"
          # Delete existing release and tag if they exist
          gh release delete "$TAG" --yes 2>/dev/null || true
          git tag -f "$TAG"
          git push origin "$TAG" --force
          # Create new release with the APK
          gh release create "$TAG" \
            "${{ steps.apk.outputs.path }}" \
            --title "Release v${{ steps.version.outputs.full }}" \
            --notes "Release build v${{ steps.version.outputs.full }}" \
            --latest

      - name: Cleanup keystore
        if: always()
        run: rm -f app/keystore.jks
